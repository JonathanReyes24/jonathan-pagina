{% extends "base.html" %}

{% block title %}{{post.title}}{% endblock %}

{% block contenido %}
<div id="publicacion">
    <div id="encabezado-post">
        <img src="{{post.photo}}" alt="{{post.title}}">
        <h1>{{post.title}}</h1>
        <p id="fecha-autor">Por Jonathan Reyes | {{post.created}}</p>
    </div>
    <div id="post">
        {{post.content|safe}}
    </div>
</div>
{% endblock %}
