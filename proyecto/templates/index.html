{% extends "base.html" %}

{% block title %}Principal{% endblock %}

{% block contenido%}
<div id="slider">
    <div id="slider-contenedor">
        {% for post in posts %}
        <a href="{{url_for('posts.post',url=post.url)}}"><img src="{{post.photo}}" alt="{{post.title}}"></a>
        {% endfor %}
    </div>
</div>
<div id="calculo"></div>
{% endblock%}

{% block javascript %}
<script src="{{url_for('static',filename="js/index.js")}}"></script>
{% endblock %}
