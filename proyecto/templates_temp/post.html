{% extends "base.html" %}

{% block contenido %}
<div id="publicacion">
    <div id="encabezado-post">
        <img src="{{url_for('static',filename=post.photo)}}" alt="{{post.photo}}">
        <h1>{{post.title}}</h1>
        <p id="fecha-autor">Por Jonathan Reyes | {{post.created}}</p>
    </div>
    <div id="post">
        {{post.content|safe}}
    </div>
</div>
{% endblock %}
